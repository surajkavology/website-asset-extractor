<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="16" cy="12" r="8" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Longitude ellipse -->
  <ellipse cx="16" cy="12" rx="3.2" ry="8" fill="none" stroke="white" stroke-width="1.1" stroke-opacity="0.55"/>
  <!-- Latitude line -->
  <line x1="8" y1="12" x2="24" y2="12" stroke="white" stroke-width="1.1" stroke-opacity="0.55"/>
  <!-- Download arrow stem -->
  <line x1="16" y1="21.5" x2="16" y2="26.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Download arrowhead -->
  <polyline points="12.5,24 16,27.5 19.5,24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
